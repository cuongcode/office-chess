services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: chess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chessuser
      POSTGRES_PASSWORD: chesspass123
      POSTGRES_DB: chessdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - chess-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chessuser -d chessdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chess-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chessuser:chesspass123@postgres:5432/chessdb
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      EMAIL_FROM: "Chess App <noreply@test.com>"
      COMPANY_EMAIL_DOMAIN: test.com
      NODE_ENV: production
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3000
    networks:
      - chess-network
    volumes:
      - ./public/avatars:/app/public/avatars

networks:
  chess-network:
    driver: bridge

volumes:
  postgres_data:
