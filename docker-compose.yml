services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: chess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - chess-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chess-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_URL: ${DOCKER_APP_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      EMAIL_FROM: ${EMAIL_FROM}
      COMPANY_EMAIL_DOMAIN: ${COMPANY_EMAIL_DOMAIN}
      NODE_ENV: production
      NEXT_PUBLIC_SOCKET_URL: ${DOCKER_APP_URL}
    networks:
      - chess-network
    volumes:
      - ./public/avatars:/app/public/avatars

  # Database Migrations
  db-migrate:
    image: node:20-alpine
    container_name: chess-db-migrate
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: sh -c "npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chess-network

networks:
  chess-network:
    driver: bridge

volumes:
  postgres_data:
